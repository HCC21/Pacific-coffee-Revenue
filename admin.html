<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="index.html" class="back-home">← 登出</a>

<h1>Admin Panel</h1>

<h2>用戶列表</h2>

<table class="admin-table">
  <thead>
    <tr>
      <th>Username</th>
      <th>Role</th>
      <th>Last Login</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="user_list"></tbody>
</table>

<hr>

<h2>新增用戶</h2>

<div class="admin-box">
  <label>Username :</label>
  <input type="text" id="new_user">

  <label>Password :</label>
  <input type="password" id="new_pass">

  <label>Role :</label>
  <select id="new_role">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select>

  <button id="addUserBtn">新增用戶</button>
</div>

<script src="user-system.js"></script>

<script>
// ========================
// Admin Page Load
// ========================
window.addEventListener("DOMContentLoaded", () => {
  if (!isAdminLoggedIn()) {
    alert("你沒有權限進入後台");
    window.location.href = "index.html";
    return;
  }

  loadUserList();
});

// ========================
// Load User List
// ========================
function loadUserList() {
  const tbody = document.getElementById("user_list");
  tbody.innerHTML = "";

  const users = getAllUsers();

  users.forEach(u => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${u.username}</td>
      <td>${u.role}</td>
      <td>${u.lastLogin || "-"}</td>
      <td>
        <button onclick="resetPassword('${u.username}')">重設密碼</button>
        <button onclick="deleteUser('${u.username}')">刪除</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// ========================
// Add User
// ========================
document.getElementById("addUserBtn").addEventListener("click", () => {
  const user = document.getElementById("new_user").value.trim();
  const pass = document.getElementById("new_pass").value.trim();
  const role = document.getElementById("new_role").value;

  if (!user || !pass) {
    alert("請輸入用戶名和密碼");
    return;
  }

  if (addUser(user, pass, role)) {
    alert("新增成功");
    loadUserList();
  } else {
    alert("用戶已存在");
  }
});

// ========================
// Reset Password
// ========================
function resetPassword(username) {
  const newPass = prompt("輸入新密碼：");
  if (!newPass) return;

  updatePassword(username, newPass);
  alert("密碼已更新");
}

// ========================
// Delete User
// ========================
function deleteUser(username) {
  if (!confirm(`確定刪除用戶 ${username}？`)) return;

  removeUser(username);
  alert("已刪除");
  loadUserList();
}
</script>

</body>
</html>
