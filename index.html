<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #f2f5f8;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-box {
    width: 330px;
    padding: 25px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
    font-weight: bold;
    color: #333;
  }

  .input-group {
    margin-bottom: 15px;
    text-align: left;
  }

  .input-group label {
    font-size: 14px;
    color: #444;
  }

  .input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    box-sizing: border-box;
  }

  .password-wrapper {
    position: relative;
  }

  .toggle-password {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
    font-size: 13px;
    color: #666;
  }

  #login-btn {
    width: 100%;
    padding: 10px;
    background: #0078ff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  #login-btn:hover {
    background: #005fcc;
  }

  .link-btn {
    margin-top: 12px;
    font-size: 14px;
    color: #0078ff;
    cursor: pointer;
  }

  #error-msg {
    margin-top: 12px;
    color: red;
    font-size: 14px;
    display: none;
  }

  /* ===== Modal ===== */
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .modal-box {
    width: 320px;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    text-align: left;
    box-shadow: 0 4px 18px rgba(0,0,0,0.2);
  }

  .modal-box input {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  .close-btn {
    text-align: right;
    cursor: pointer;
    font-size: 14px;
    color: #666;
  }
</style>
</head>

<body>

<div class="login-box">
  <h2>登入報數系統</h2>

  <div class="input-group">
    <label>用戶名稱</label>
    <input type="text" id="login-name" placeholder="輸入用戶名稱">
  </div>

  <div class="input-group password-wrapper">
    <label>密碼</label>
    <input type="password" id="login-pass" placeholder="輸入密碼">
    <span class="toggle-password" onclick="togglePassword()">顯示</span>
  </div>

  <button id="login-btn">登入</button>

  <div class="link-btn" onclick="openCreate()">➕ 新增帳號</div>
  <div class="link-btn" onclick="openReset()">🔑 忘記密碼</div>

  <div id="error-msg">帳號或密碼錯誤</div>
</div>

<!-- ===== 新增帳號 Modal ===== -->
<div class="modal" id="create-modal">
  <div class="modal-box">
    <div class="close-btn" onclick="closeCreate()">✖</div>
    <h3>新增帳號</h3>

    <label>用戶名稱</label>
    <input type="text" id="new-name">

    <label>密碼</label>
    <input type="password" id="new-pass">

    <button onclick="createAccount()">建立帳號</button>
  </div>
</div>

<!-- ===== 忘記密碼 Modal ===== -->
<div class="modal" id="reset-modal">
  <div class="modal-box">
    <div class="close-btn" onclick="closeReset()">✖</div>
    <h3>重設密碼</h3>

    <label>用戶名稱</label>
    <input type="text" id="reset-name">

    <label>新密碼</label>
    <input type="password" id="reset-pass">

    <button onclick="resetPassword()">重設密碼</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseUrl = "https://uqxzcguxmboubhzekkyi.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxeHpjZ3V4bWJvdWJoemVra3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjE4NTIsImV4cCI6MjA5NzA5Nzg1Mn0.rc_BkdzMpj28bbG5rP9OCsm0Msqvvf5N78URb4d7gO8";  
  const db = supabase.createClient(supabaseUrl, supabaseKey);

  function togglePassword() {
    const pass = document.getElementById("login-pass");
    const toggle = document.querySelector(".toggle-password");
    if (pass.type === "password") {
      pass.type = "text";
      toggle.textContent = "隱藏";
    } else {
      pass.type = "password";
      toggle.textContent = "顯示";
    }
  }

  // ===== 登入 =====
  document.getElementById("login-btn").addEventListener("click", async () => {
    const name = document.getElementById("login-name").value.trim();
    const pass = document.getElementById("login-pass").value.trim();
    const errorMsg = document.getElementById("error-msg");

    const { data, error } = await db
      .from("users")
      .select("*")
      .eq("name", name)
      .eq("password", pass)
      .single();

    console.log("Supabase result:", data, error);

    if (error || !data) {
      errorMsg.style.display = "block";
      return;
    }

    localStorage.setItem("friendName", name);
    localStorage.setItem("role", data.role);

    console.log("Login success, role =", data.role);

    if (data.role === "admin") {
      console.log("Redirecting to admin.html...");
      window.location.href = "admin.html";
    } else {
      console.log("Redirecting to main.html...");
      window.location.href = "main.html";
    }
  });

  // ===== Modal 控制 =====
  function openCreate() { document.getElementById("create-modal").style.display = "flex"; }
  function closeCreate() { document.getElementById("create-modal").style.display = "none"; }

  function openReset() { document.getElementById("reset-modal").style.display = "flex"; }
  function closeReset() { document.getElementById("reset-modal").style.display = "none"; }

  // ===== 新增帳號 =====
  async function createAccount() {
    const name = document.getElementById("new-name").value.trim();
    const pass = document.getElementById("new-pass").value.trim();

    if (!name || !pass) {
      alert("請輸入帳號和密碼");
      return;
    }

    const { error } = await db
      .from("users")
      .insert([{ name, password: pass, role: "user" }]);

    if (error) {
      alert("帳號已存在或建立失敗");
      return;
    }

    alert("帳號建立成功！");
    closeCreate();
  }

  // ===== 忘記密碼 =====
  async function resetPassword() {
    const name = document.getElementById("reset-name").value.trim();
    const pass = document.getElementById("reset-pass").value.trim();

    if (!name || !pass) {
      alert("請輸入帳號和新密碼");
      return;
    }

    const { error } = await db
      .from("users")
      .update({ password: pass })
      .eq("name", name);

    if (error) {
      alert("重設失敗，帳號不存在");
      return;
    }

    alert("密碼已重設！");
    closeReset();
  }
</script>

</body>
</html>
