<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select Year</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Select Year</h1>

<div style="margin-bottom:20px;">
  <label>Year :</label>
  <input type="number" id="year_input" value="2026" style="width:120px;">
  <button id="saveYearBtn">Save Year</button>
</div>

<h2>Months</h2>

<div class="month-grid">
  <a href="jan.html">January</a>
  <a href="feb.html">February</a>
  <a href="mar.html">March</a>
  <a href="apr.html">April</a>
  <a href="may.html">May</a>
  <a href="jun.html">June</a>
  <a href="jul.html">July</a>
  <a href="aug.html">August</a>
  <a href="sep.html">September</a>
  <a href="oct.html">October</a>
  <a href="nov.html">November</a>
  <a href="dec.html">December</a>
</div>

<script>
document.getElementById("saveYearBtn").addEventListener("click", () => {
  const year = document.getElementById("year_input").value;
  localStorage.setItem("global_year", year);
  alert("Year saved: " + year);
});

// 頁面載入時自動讀取 global_year
window.addEventListener("DOMContentLoaded", () => {
  const y = localStorage.getItem("global_year");
  if (y) document.getElementById("year_input").value = y;
});
</script>

</body>
</html>
