<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>報數系統</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== 背景 ===== */
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #f7f2ef 0%, #f0e6e2 100%);
  font-family: "Segoe UI", Arial, sans-serif;
  text-align: center;
}

/* ===== 用戶列 ===== */
.user-bar {
  width: 100%;
  background: #ffffff;
  padding: 15px;
  font-size: 20px;
  color: #333;
  border-bottom: 2px solid #8B0000;
  position: sticky;
  top: 0;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

.logout-btn {
  padding: 6px 12px;
  background: #8B0000;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.logout-btn:hover {
  background: #a00000;
}

/* ===== 標題 ===== */
h1 {
  margin-top: 40px;
  font-size: 32px;
  color: #8B0000;
}

/* ===== 年份選擇 ===== */
.year-box {
  margin-top: 20px;
}

select {
  padding: 10px;
  font-size: 18px;
  border-radius: 8px;
  border: 1px solid #aaa;
}

/* ===== 月份按鈕 Grid ===== */
.month-grid {
  margin: 40px auto;
  width: 85%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

/* ===== 月份按鈕 ===== */
.month-btn {
  padding: 20px;
  background: #8B0000;
  color: white;
  border-radius: 10px;
  font-size: 20px;
  cursor: pointer;
  border: none;
  transition: 0.2s;
}

.month-btn:hover {
  background: #a00000;
}

/* ===== 手機版優化 ===== */
@media (max-width: 480px) {
  h1 { font-size: 26px; }
  .month-grid {
    grid-template-columns: repeat(2, 1fr);
    width: 90%;
  }
  .month-btn {
    padding: 18px;
    font-size: 18px;
  }
  select {
    font-size: 16px;
    padding: 8px;
  }
}

/* ===== 語言切換 ===== */
.lang-switch {
  margin-top: 10px;
  font-size: 16px;
  cursor: pointer;
  color: #444;
}
</style>
</head>

<body>

<!-- ⭐ 用戶列 -->
<div class="user-bar">
  <span id="welcome_user"></span>
  <button class="logout-btn" onclick="changeUser()" id="logout-text"></button>
</div>

<h1 id="title-text"></h1>

<!-- ⭐ 語言切換 -->
<div class="lang-switch" onclick="toggleLang()">🌐 中文 / English</div>

<!-- ⭐ 年份選擇 -->
<div class="year-box">
  <label id="year-label" style="font-size:20px;"></label>
  <select id="year_select">
    <option>2024</option>
    <option>2025</option>
    <option selected>2026</option>
    <option>2027</option>
    <option>2028</option>
  </select>
</div>

<!-- ⭐ 已選分店顯示 -->
<div id="selected-stores-box" style="margin-top:20px; font-size:18px; color:#8B0000; font-weight:bold;"></div>

<!-- ⭐ 分店選擇器 -->
<div id="store-box" style="margin-top:25px; display:none;">
  <h3 id="store-title"></h3>
  <div id="store-list" style="margin-top:10px;"></div>
</div>

<!-- ⭐ Area Dashboard 按鈕 -->
<div id="dashboard-box" style="margin-top:30px;"></div>

<!-- ⭐ 月份按鈕 -->
<div class="month-grid" id="month-grid"></div>

<!-- ⭐ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ===== Supabase ===== */
const supabaseUrl = "https://uqxzcguxmboubhzekkyi.supabase.co";
const supabaseKey =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxeHpjZ3V4bWJvdWJoemVra3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjE4NTIsImV4cCI6MjA5NzA5Nzg1Mn0.rc_BkdzMpj28bbG5rP9OCsm0Msqvvf5N78URb4d7gO8";

const db = supabase.createClient(supabaseUrl, supabaseKey);

/* ===========================
   語言資料（繁中 HK + 英文）
=========================== */
const langData = {
  zh: {
    welcome: "👋 歡迎，",
    title: "📅 報數系統",
    logout: "更換用戶",
    year: "選擇年份：",
    storeTitle: "選擇分店：",
    selected: "已選分店：",
    none: "未選擇分店",
    dashboard: "📊 區域儀表板",
    months: ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"]
  },
  en: {
    welcome: "👋 Welcome, ",
    title: "📅 Reporting System",
    logout: "Change User",
    year: "Select Year:",
    storeTitle: "Select Stores:",
    selected: "Selected Stores: ",
    none: "No store selected",
    dashboard: "📊 Area Dashboard",
    months: ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"]
  }
};

let currentLang = "zh";
const role = localStorage.getItem("role");
const userName = localStorage.getItem("userName");

/* ===========================
   語言套用
=========================== */
function applyLang() {
  const t = langData[currentLang];

  document.getElementById("welcome_user").innerText =
    t.welcome + (localStorage.getItem("userName") || "");
  document.getElementById("title-text").innerText = t.title;
  document.getElementById("logout-text").innerText = t.logout;
  document.getElementById("year-label").innerText = t.year;
  document.getElementById("store-title").innerText = t.storeTitle;

  /* 月份按鈕 */
  const grid = document.getElementById("month-grid");
  grid.innerHTML = "";
  t.months.forEach((m, i) => {
    grid.innerHTML += `<button class="month-btn" onclick="openMonth(${i+1})">${m}</button>`;
  });

  /* Dashboard 按鈕 */
  if (role === "admin" || role === "area_manager") {
    document.getElementById("dashboard-box").innerHTML = `
      <button class="month-btn" onclick="openDashboard()">
        ${t.dashboard}
      </button>
    `;
  }

  updateSelectedStoresDisplay();
}

/* ===========================
   語言切換
=========================== */
function toggleLang() {
  currentLang = currentLang === "zh" ? "en" : "zh";
  applyLang();
}

/* ===========================
   顯示已選分店
=========================== */
function updateSelectedStoresDisplay() {
  const box = document.getElementById("selected-stores-box");
  const selected = JSON.parse(localStorage.getItem("selectedStores") || "[]");

  if (!selected || selected.length === 0) {
    box.innerText = langData[currentLang].none;
    return;
  }

  box.innerText = langData[currentLang].selected + selected.join(" + ");
}

/* ===========================
   分店選擇器
=========================== */
async function initStoreSelector() {
  const box = document.getElementById("store-box");
  const list = document.getElementById("store-list");

  if (role === "user") {
    box.style.display = "block";
    list.innerHTML = `<b>${userName}</b>`;
    localStorage.setItem("selectedStores", JSON.stringify([userName]));
    updateSelectedStoresDisplay();
    return;
  }

  let allStores = [];

  if (role === "admin") {
    const { data } = await db.from("users").select("name").eq("role", "user");
    allStores = data.map(u => u.name);
  }

  if (role === "area_manager") {
    const { data } = await db
      .from("users")
      .select("managed_stores")
      .eq("name", userName)
      .single();

    allStores = data?.managed_stores || [];
  }

  box.style.display = "block";
  list.innerHTML = "";

  allStores.forEach(store => {
    const id = "store_" + store;
    list.innerHTML += `
      <label style="margin-right:15px;">
        <input type="checkbox" id="${id}" value="${store}">
        ${store}
      </label>
    `;
  });

  const selected = JSON.parse(localStorage.getItem("selectedStores") || "[]");
  selected.forEach(s => {
    const el = document.getElementById("store_" + s);
    if (el) el.checked = true;
  });

  list.addEventListener("change", () => {
    const checked = [...document.querySelectorAll("#store-list input:checked")]
      .map(i => i.value);

    localStorage.setItem("selectedStores", JSON.stringify(checked));
    updateSelectedStoresDisplay();
  });

  updateSelectedStoresDisplay();
}

/* ===========================
   打開 Dashboard
=========================== */
function openDashboard() {
  const year = document.getElementById("year_select").value;
  localStorage.setItem("global_year", year);
  window.location.href = "area.html";
}

/* ===========================
   更換用戶
=========================== */
function changeUser() {
  localStorage.clear();
  window.location.href = "login.html";
}

/* ===========================
   打開月份
=========================== */
function openMonth(m) {
  const year = document.getElementById("year_select").value;
  localStorage.setItem("global_year", year);

  const monthNames = [
    "", "jan", "feb", "mar", "apr", "may", "jun",
    "jul", "aug", "sep", "oct", "nov", "dec"
  ];

  window.location.href = monthNames[m] + ".html";
}

/* ===========================
   初始化
=========================== */
applyLang();
initStoreSelector();
updateSelectedStoresDisplay();
</script>

</body>
</html>
