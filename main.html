<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>Main</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
  .box {
    max-width: 600px; margin: 40px auto; background: #fff;
    padding: 20px; border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.1);
  }
  h2 { margin-top: 0; }
  button {
    padding: 8px 14px; border: none; background: #0078ff;
    color: white; border-radius: 6px; cursor: pointer; margin-right: 10px;
  }
  button:hover { background: #005fcc; }
</style>
</head>
<body>
<div class="box">
  <h2 id="welcome"></h2>
  <p>你可以進入以下頁面：</p>
  <button onclick="goRevenue()">📊 每月報數表</button>
  <button onclick="logout()">登出</button>
</div>

<script>
  const userName = localStorage.getItem("userName");
  const role = localStorage.getItem("role");

  if (!userName) {
    window.location.href = "login.html";
  }

  document.getElementById("welcome").textContent =
    `歡迎，${userName}（${role === "admin" ? "管理員" : "用戶"}）`;

  function goRevenue() {
    window.location.href = "index.html";
  }

  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>
</body>
</html>
